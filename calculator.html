<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>간단한 계산기</title>
  <style>
    /* 전체 페이지 중앙 정렬 */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    /* 계산기 외형 */
    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      width: 300px;
    }

    /* 숫자가 표시되는 화면 */
    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 20px 16px;
      margin-bottom: 20px;
      text-align: right;
    }

    /* 이전 계산식 (작게 표시) */
    .display .expression {
      color: #a0aec0;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 4px;
    }

    /* 현재 숫자 (크게 표시) */
    .display .current {
      color: #e2e8f0;
      font-size: 36px;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* 버튼 그리드 (4열 배치) */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    /* 기본 버튼 스타일 */
    button {
      padding: 18px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    /* 클릭 시 살짝 눌리는 효과 */
    button:active {
      transform: scale(0.94);
    }

    /* 숫자 버튼 */
    .btn-number {
      background: #1a1a3e;
      color: #e2e8f0;
    }

    .btn-number:hover {
      background: #252550;
    }

    /* 연산자 버튼 (+, -, *, /) */
    .btn-operator {
      background: #e94560;
      color: white;
    }

    .btn-operator:hover {
      opacity: 0.85;
    }

    /* = 버튼 */
    .btn-equals {
      background: #f5a623;
      color: white;
      font-weight: bold;
    }

    .btn-equals:hover {
      opacity: 0.85;
    }

    /* AC, +/-, % 버튼 */
    .btn-function {
      background: #2d3748;
      color: #a0aec0;
    }

    .btn-function:hover {
      background: #3a4a5c;
    }

    /* 0 버튼은 2칸 차지 */
    .btn-zero {
      grid-column: span 2;
      text-align: left;
      padding-left: 24px;
    }
  </style>
</head>
<body>

<div class="calculator">

  <!-- 화면 영역 -->
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="current" id="current">0</div>
  </div>

  <!-- 버튼 영역 -->
  <div class="buttons">
    <!-- 1행 -->
    <button class="btn-function" onclick="clearAll()">AC</button>
    <button class="btn-function" onclick="toggleSign()">+/-</button>
    <button class="btn-function" onclick="percent()">%</button>
    <button class="btn-operator" onclick="setOperator('/')">÷</button>

    <!-- 2행 -->
    <button class="btn-number" onclick="inputNumber('7')">7</button>
    <button class="btn-number" onclick="inputNumber('8')">8</button>
    <button class="btn-number" onclick="inputNumber('9')">9</button>
    <button class="btn-operator" onclick="setOperator('*')">×</button>

    <!-- 3행 -->
    <button class="btn-number" onclick="inputNumber('4')">4</button>
    <button class="btn-number" onclick="inputNumber('5')">5</button>
    <button class="btn-number" onclick="inputNumber('6')">6</button>
    <button class="btn-operator" onclick="setOperator('-')">−</button>

    <!-- 4행 -->
    <button class="btn-number" onclick="inputNumber('1')">1</button>
    <button class="btn-number" onclick="inputNumber('2')">2</button>
    <button class="btn-number" onclick="inputNumber('3')">3</button>
    <button class="btn-operator" onclick="setOperator('+')">+</button>

    <!-- 5행 -->
    <button class="btn-number btn-zero" onclick="inputNumber('0')">0</button>
    <button class="btn-number" onclick="inputDot()">.</button>
    <button class="btn-equals" onclick="calculate()">=</button>
  </div>

</div>

<script>
  // 계산기 상태를 담는 변수들
  let currentValue = '0';   // 현재 화면에 보이는 숫자
  let previousValue = '';   // 이전에 입력한 숫자
  let operator = null;      // 선택된 연산자 (+, -, *, /)
  let shouldReset = false;  // 다음 숫자 입력 시 화면 초기화 여부

  // 화면 업데이트 함수
  function updateDisplay() {
    document.getElementById('current').textContent = currentValue;
  }

  // 이전 계산식 표시 함수
  function updateExpression(text) {
    document.getElementById('expression').textContent = text;
  }

  // 숫자 버튼 클릭
  function inputNumber(num) {
    // 연산자 클릭 후 새 숫자 입력 시 화면 초기화
    if (shouldReset) {
      currentValue = num;
      shouldReset = false;
    } else {
      // 0이면 그냥 교체, 아니면 이어붙이기 (최대 10자리)
      currentValue = currentValue === '0'
        ? num
        : currentValue.length < 10 ? currentValue + num : currentValue;
    }
    updateDisplay();
  }

  // 소수점 버튼 클릭
  function inputDot() {
    if (shouldReset) {
      currentValue = '0.';
      shouldReset = false;
    } else if (!currentValue.includes('.')) {
      // 소수점이 없을 때만 추가
      currentValue += '.';
    }
    updateDisplay();
  }

  // AC 버튼: 모든 상태 초기화
  function clearAll() {
    currentValue = '0';
    previousValue = '';
    operator = null;
    shouldReset = false;
    updateDisplay();
    updateExpression('');
  }

  // +/- 버튼: 양수/음수 전환
  function toggleSign() {
    currentValue = String(parseFloat(currentValue) * -1);
    updateDisplay();
  }

  // % 버튼: 백분율로 변환
  function percent() {
    currentValue = String(parseFloat(currentValue) / 100);
    updateDisplay();
  }

  // 연산자 버튼 클릭 (+, -, *, /)
  function setOperator(op) {
    // 연산자 클릭 전에 이미 연산자가 있으면 먼저 계산
    if (operator && !shouldReset) {
      calculate();
    }
    previousValue = currentValue;
    operator = op;
    shouldReset = true;  // 다음 숫자 입력 시 초기화

    // 연산자 기호를 보기 좋게 변환
    const opDisplay = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    updateExpression(`${previousValue} ${opDisplay[op]}`);
  }

  // = 버튼: 계산 실행
  function calculate() {
    if (!operator || !previousValue) return;

    const prev = parseFloat(previousValue);
    const curr = parseFloat(currentValue);
    let result;

    // 연산자에 따라 계산
    switch (operator) {
      case '+': result = prev + curr; break;
      case '-': result = prev - curr; break;
      case '*': result = prev * curr; break;
      case '/':
        // 0으로 나누기 방지
        result = curr === 0 ? 'Error' : prev / curr;
        break;
    }

    const opDisplay = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    updateExpression(`${previousValue} ${opDisplay[operator]} ${currentValue} =`);

    // 소수점이 너무 길면 반올림
    currentValue = typeof result === 'number'
      ? String(parseFloat(result.toFixed(8)))
      : result;

    operator = null;
    previousValue = '';
    shouldReset = true;
    updateDisplay();
  }

  // 키보드 입력도 지원
  document.addEventListener('keydown', (e) => {
    if (e.key >= '0' && e.key <= '9') inputNumber(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') setOperator('+');
    else if (e.key === '-') setOperator('-');
    else if (e.key === '*') setOperator('*');
    else if (e.key === '/') { e.preventDefault(); setOperator('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      // 백스페이스: 마지막 글자 삭제
      currentValue = currentValue.length > 1
        ? currentValue.slice(0, -1)
        : '0';
      updateDisplay();
    }
  });
</script>

</body>
</html>
