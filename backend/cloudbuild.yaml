availableSecrets:
  secretManager:
    - versionName: projects/fresh-sanctuary-489804-v4/secrets/kakao-rest-api-key/versions/latest
      env: KAKAO_API_KEY
    - versionName: projects/fresh-sanctuary-489804-v4/secrets/kakao-refresh-token/versions/latest
      env: KAKAO_REFRESH_TOKEN

steps:
  # 캐시 무효화 여부 사전 경고
  - name: 'bash'
    id: cache-check
    args:
      - '-c'
      - |
        CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null || echo "")
        if echo "$$CHANGED" | grep -qE 'Dockerfile|pyproject\.toml|uv\.lock'; then
          echo "⚠️ 캐시 무효화: 의존성/Dockerfile 변경됨 → 전체 재빌드 (약 8분 소요)"
        else
          echo "✅ 캐시 정상 → 빠른 빌드 예상 (약 1~2분)"
        fi

  # 이전 이미지 pull (캐시 소스)
  - name: 'gcr.io/cloud-builders/docker'
    id: pull-cache
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull asia-northeast3-docker.pkg.dev/fresh-sanctuary-489804-v4/cloud-run-source-deploy/samba-wave-api:latest || true

  # Docker 빌드 (레이어 캐시 활용)
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - build
      - '--cache-from'
      - 'asia-northeast3-docker.pkg.dev/fresh-sanctuary-489804-v4/cloud-run-source-deploy/samba-wave-api:latest'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '-t'
      - 'asia-northeast3-docker.pkg.dev/fresh-sanctuary-489804-v4/cloud-run-source-deploy/samba-wave-api:$COMMIT_SHA'
      - '-t'
      - 'asia-northeast3-docker.pkg.dev/fresh-sanctuary-489804-v4/cloud-run-source-deploy/samba-wave-api:latest'
      - '.'

  # 카카오톡 나에게 보내기 알림 (refresh_token으로 access_token 자동 갱신)
  - name: 'bash'
    id: kakao-notify
    secretEnv: ['KAKAO_API_KEY', 'KAKAO_REFRESH_TOKEN']
    args:
      - '-c'
      - |
        ACCESS_TOKEN=$(curl -s -X POST https://kauth.kakao.com/oauth/token \
          -d "grant_type=refresh_token" \
          -d "client_id=$$KAKAO_API_KEY" \
          -d "refresh_token=$$KAKAO_REFRESH_TOKEN" \
          | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

        SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
        curl -s -X POST https://kapi.kakao.com/v2/api/talk/memo/default/send \
          -H "Authorization: Bearer $$ACCESS_TOKEN" \
          --data-urlencode "template_object={\"object_type\":\"text\",\"text\":\"✅ 배포 완료\n커밋: $${SHORT_SHA}\n브랜치: $BRANCH_NAME\",\"link\":{\"web_url\":\"https://console.cloud.google.com/cloud-build/builds?project=fresh-sanctuary-489804-v4\"}}"

images:
  - 'asia-northeast3-docker.pkg.dev/fresh-sanctuary-489804-v4/cloud-run-source-deploy/samba-wave-api:$COMMIT_SHA'
  - 'asia-northeast3-docker.pkg.dev/fresh-sanctuary-489804-v4/cloud-run-source-deploy/samba-wave-api:latest'
