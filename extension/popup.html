<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SAMBA-WAVE</title>
  <link rel="icon" href="icon16.png" type="image/png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      font-family: 'Segoe UI', sans-serif;
      background: #0F0F0F;
      color: #E5E5E5;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 20px 16px;
      gap: 10px;
    }

    .icon { width: 40px; height: 40px; border-radius: 8px; }
    .app-name { font-size: 15px; font-weight: 700; color: #FFB84D; }
    .version { font-size: 11px; color: #666; }
    .divider { width: 100%; height: 1px; background: #2D2D2D; }

    .status-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.on { background: #22c55e; }
    .dot.off { background: #666; }

    .status-label { color: #999; font-size: 11px; }

    .login-btn {
      font-size: 10px;
      color: #FFB84D;
      background: rgba(255, 140, 0, 0.1);
      border: 1px solid rgba(255, 140, 0, 0.3);
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
    }

    .login-btn:hover { background: rgba(255, 140, 0, 0.2); }

    .sync-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #22c55e;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="icon48.png" class="icon">
    <div class="app-name">SAMBA-WAVE</div>
    <div class="version" id="version"></div>
    <div class="divider"></div>

    <div class="status-list">
      <div class="status-row">
        <div class="status-left">
          <span class="dot" id="musinsa-dot"></span>
          <span>무신사</span>
        </div>
        <span class="status-label" id="musinsa-status"></span>
      </div>
      <div class="status-row">
        <div class="status-left">
          <span class="dot" id="kream-dot"></span>
          <span>KREAM</span>
        </div>
        <span id="kream-action">
          <span class="status-label" id="kream-status"></span>
        </span>
      </div>
      <div class="status-row">
        <div class="status-left">
          <span class="dot" id="proxy-dot"></span>
          <span>Proxy</span>
        </div>
        <span class="status-label" id="proxy-status"></span>
      </div>
    </div>

    <div class="divider"></div>
    <div class="sync-badge">
      <span class="sync-dot"></span>
      자동 동기화 활성
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
