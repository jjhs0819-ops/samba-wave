name: CI — Lint & Type Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'

jobs:
  # 변경된 경로 감지
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend:
    name: Backend (Python)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e .
          uv pip install -e .[dev]

      - name: Ruff lint
        run: uv run ruff check . --output-format=github

      - name: Ruff format check
        run: uv run ruff format --check .

      # [2026-04-17 사고 후속] 의도치 않은 DROP 감지 — autogenerate 오류 방지
      # 실수로 env.py 모델 import 누락 시 alembic이 DROP 18개짜리 migration 생성하는 사고 재발 방지
      - name: Alembic migration safety check (DROP detection)
        run: |
          # PR/push에 새로 추가된 alembic 파일에서 의도치 않은 DROP 감지
          DROP_FILES=$(git diff --name-only --diff-filter=A "origin/main" -- 'alembic/versions/*.py' 2>/dev/null || git diff --name-only HEAD~1 HEAD -- 'alembic/versions/*.py' 2>/dev/null || true)
          if [ -z "$DROP_FILES" ]; then
            echo "✅ 신규 alembic 파일 없음 — 스킵"
            exit 0
          fi
          echo "검사 대상 신규 alembic 파일:"
          echo "$DROP_FILES"
          BLOCKERS=""
          for f in $DROP_FILES; do
            # op.drop_table / op.drop_index ix_* 감지 (의도된 DROP은 커밋 메시지에 명시)
            if grep -nE "op\.drop_table\(|op\.drop_index\(op\.f\(\"ix_" "$f" 2>/dev/null; then
              BLOCKERS="$BLOCKERS $f"
            fi
          done
          if [ -n "$BLOCKERS" ]; then
            # 커밋 메시지에 [intended-drop] 태그 있으면 통과
            if git log -1 --pretty=%B | grep -q '\[intended-drop\]'; then
              echo ""
              echo "⚠️  DROP 감지됐으나 커밋 메시지 [intended-drop] 태그로 승인됨 → 통과"
              exit 0
            fi
            echo ""
            echo "❌ 의도치 않은 DROP 감지:$BLOCKERS"
            echo ""
            echo "조치:"
            echo "  1. env.py에서 모델 import 누락 여부 확인 (pkgutil.walk_packages 작동 확인)"
            echo "  2. 의도된 DROP이면 커밋 메시지에 '[intended-drop]' 태그 추가 후 다시 푸시"
            echo "  3. 의도 외 DROP이면 해당 줄을 제거하거나 op.execute('DROP ... IF EXISTS')로 멱등화"
            exit 1
          fi
          echo "✅ DROP 없음 — 안전"

  frontend:
    name: Frontend (TypeScript)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm tsc --noEmit

      - name: ESLint
        run: pnpm eslint .
