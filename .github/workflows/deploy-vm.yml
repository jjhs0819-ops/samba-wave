# VM 배포 워크플로우 — main 브랜치 푸시 시 자동 실행
#
# 사전 설정 (Settings → Secrets → Actions):
# - GCP_SA_KEY: GCP 서비스 계정 키 (Artifact Registry Writer + Compute SSH)
# - VM_SSH_PRIVATE_KEY: VM 접속용 SSH 개인키
# - VM_HOST: VM 외부 IP 또는 도메인
# - VM_USER: SSH 사용자 (보통 ubuntu)
#
# 현재 비활성화 — 수동 트리거만. main 푸시 자동 배포는 Cloud Build가 담당 (당분간 병행).
# VM 전환 완료 후 on.push 활성화 예정.

name: Deploy to GCE VM

on:
  workflow_dispatch: # 수동 실행만. VM 전환 후 push 활성화.
    inputs:
      reason:
        description: "배포 사유"
        required: false
        default: "manual"

env:
  GCP_PROJECT: fresh-sanctuary-489804-v4
  AR_REGION: asia-northeast3
  AR_REPO: cloud-run-source-deploy
  IMAGE_NAME: samba-wave-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: GCP 인증
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: gcloud 설정
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker 인증 (Artifact Registry)
        run: gcloud auth configure-docker ${{ env.AR_REGION }}-docker.pkg.dev --quiet

      - name: Docker 빌드 & 푸시
        run: |
          IMAGE="${{ env.AR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}"
          SHA="${GITHUB_SHA::7}"
          docker buildx build \
            --platform linux/amd64 \
            --cache-from "$IMAGE:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "$IMAGE:$SHA" \
            -t "$IMAGE:latest" \
            --push \
            ./backend

      - name: SSH 키 세팅
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: VM에 배포 (이미지 pull + 재시작)
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'ENDSSH'
            set -e
            cd /opt/samba
            sudo docker compose pull samba-api
            sudo docker compose up -d samba-api
            echo "=== 배포 후 5초 대기 ==="
            sleep 5
            sudo docker compose ps
          ENDSSH

      - name: 헬스체크
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "https://${{ secrets.VM_HOST }}/api/v1/health" || echo 000)
            if [ "$STATUS" = "200" ]; then
              echo "✅ 헬스체크 통과 (시도 $i)"
              exit 0
            fi
            echo "⏳ HTTP $STATUS — 10초 후 재시도 ($i/5)"
            sleep 10
          done
          echo "❌ 헬스체크 실패"
          exit 1

      - name: 카카오톡 배포 알림
        if: always()
        env:
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          STATUS="${{ job.status }}"
          ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          if [ -z "$KAKAO_API_KEY" ]; then exit 0; fi
          ACCESS_TOKEN=$(curl -s -X POST https://kauth.kakao.com/oauth/token \
            -d "grant_type=refresh_token" \
            -d "client_id=$KAKAO_API_KEY" \
            -d "refresh_token=$KAKAO_REFRESH_TOKEN" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])" 2>/dev/null || echo "")
          if [ -z "$ACCESS_TOKEN" ]; then exit 0; fi
          curl -s -X POST https://kapi.kakao.com/v2/api/talk/memo/default/send \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            --data-urlencode "template_object={\"object_type\":\"text\",\"text\":\"$ICON VM 배포 $STATUS\n커밋: $SHORT_SHA\",\"link\":{\"web_url\":\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}}"
