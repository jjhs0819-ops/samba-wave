name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t asia-northeast3-docker.pkg.dev/glass-sight-452013-n6/samba-wave/backend:latest ./backend

      - name: Push Docker image
        run: docker push asia-northeast3-docker.pkg.dev/glass-sight-452013-n6/samba-wave/backend:latest

      - uses: google-github-actions/setup-gcloud@v2

      - name: Run DB Migrations
        run: |
          pip install uv
          cd backend
          uv venv
          source .venv/bin/activate
          uv pip install -e . --quiet
          export write_db_user=${{ secrets.DB_WRITE_USER }}
          export write_db_password=${{ secrets.DB_WRITE_PASSWORD }}
          export write_db_host=${{ secrets.DB_WRITE_HOST }}
          export write_db_port=5432
          export write_db_name=samba-wave
          export read_db_user=${{ secrets.DB_READ_USER }}
          export read_db_password=${{ secrets.DB_READ_PASSWORD }}
          export read_db_host=${{ secrets.DB_READ_HOST }}
          export read_db_port=5432
          export read_db_name=samba-wave
          export db_ssl_required=false
          export jwt_secret_key=${{ secrets.JWT_SECRET_KEY }}
          export environment=production
          alembic upgrade head

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy samba-wave-backend \
            --image asia-northeast3-docker.pkg.dev/glass-sight-452013-n6/samba-wave/backend:latest \
            --region asia-northeast3 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --set-env-vars ENVIRONMENT=production,write_db_user=${{ secrets.DB_WRITE_USER }},write_db_password=${{ secrets.DB_WRITE_PASSWORD }},write_db_host=${{ secrets.DB_WRITE_HOST }},write_db_port=5432,write_db_name=samba-wave,read_db_user=${{ secrets.DB_READ_USER }},read_db_password=${{ secrets.DB_READ_PASSWORD }},read_db_host=${{ secrets.DB_READ_HOST }},read_db_port=5432,read_db_name=samba-wave,db_ssl_required=false,jwt_secret_key=${{ secrets.JWT_SECRET_KEY }},AWS_EC2_METADATA_DISABLED=true \
            --project glass-sight-452013-n6 \
            --quiet
