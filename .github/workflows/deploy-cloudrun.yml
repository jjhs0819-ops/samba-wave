name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Check migration sync
        run: |
          MODEL_CHANGED=$(git diff HEAD~1 --name-only | grep 'model\.py' || true)
          if [ -n "$MODEL_CHANGED" ]; then
            NEW_MIGRATION=$(git diff HEAD~1 --name-only | grep 'alembic/versions/' || true)
            if [ -z "$NEW_MIGRATION" ]; then
              echo "❌ model.py 변경됨 but 마이그레이션 파일 없음!"
              echo "변경된 모델: $MODEL_CHANGED"
              exit 1
            fi
            echo "✅ 모델 변경 + 마이그레이션 파일 확인됨"
          else
            echo "✅ 모델 변경 없음 — 스킵"
          fi

      # ──────────────────────────────────────────────────────────
      # 환경변수 전략:
      #   고정 시크릿(DB/JWT/API키) → Cloud Run에 한번만 수동 설정, 여기서 안 건드림
      #   변경되는 값(COMMIT_SHA 등) → --update-env-vars로 추가/갱신 (기존 값 보존)
      #
      # ⚠️ --env-vars-file / --set-env-vars 는 전체 교체라서 사용 금지
      #    GitHub Secret이 하나라도 비면 DB 비밀번호가 날아감
      # ──────────────────────────────────────────────────────────

      - name: Deploy to Cloud Run
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          gcloud run deploy samba-wave-api \
            --source ./backend \
            --region asia-northeast3 \
            --project fresh-sanctuary-489804-v4 \
            --revision-suffix="${SHORT_SHA}" \
            --update-labels="commit-sha=${SHORT_SHA}" \
            --update-env-vars "COMMIT_SHA=${{ github.sha }},WEB_CONCURRENCY=1,GUNICORN_CMD_ARGS=--timeout 300 --graceful-timeout 300,TERMINATION_GRACE_HACK=1" \
            --memory 2Gi \
            --min-instances=1 \
            --max-instances=1 \
            --no-cpu-throttling \
            --quiet

      - name: Verify traffic on latest revision
        run: |
          LATEST=$(gcloud run revisions list \
            --service=samba-wave-api \
            --region=asia-northeast3 \
            --project=fresh-sanctuary-489804-v4 \
            --sort-by=~createTime \
            --limit=1 \
            --format="value(name)")
          SERVING=$(gcloud run services describe samba-wave-api \
            --region=asia-northeast3 \
            --project=fresh-sanctuary-489804-v4 \
            --format="value(status.traffic[0].revisionName)")
          echo "최신 리비전: $LATEST"
          echo "트래픽 리비전: $SERVING"
          if [ "$LATEST" != "$SERVING" ]; then
            echo "⚠️ 트래픽이 구 리비전에 고정됨 — 강제 전환"
            gcloud run services update-traffic samba-wave-api \
              --region=asia-northeast3 \
              --project=fresh-sanctuary-489804-v4 \
              --to-latest --quiet
            echo "✅ 최신 리비전으로 트래픽 전환 완료"
          fi

      - name: Health Check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://samba-wave-api-363598397345.asia-northeast3.run.app/api/v1/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check 실패 (HTTP $STATUS)"
            gcloud run services describe samba-wave-api \
              --region=asia-northeast3 \
              --project=fresh-sanctuary-489804-v4 \
              --format="value(status.traffic)"
            exit 1
          fi
          echo "✅ Health check 통과"
