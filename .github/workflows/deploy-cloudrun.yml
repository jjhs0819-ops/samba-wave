name: Deploy Backend to Cloud Run

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_KEY }}
          PROJECT: samba-wave-molle
          INSTANCE: samba-wave-molle:asia-northeast3:samba-wave-db
        run: |
          gcloud run deploy samba-wave-api \
            --source ./backend \
            --region asia-northeast3 \
            --project "${PROJECT}" \
            --set-env-vars "^||^ENVIRONMENT=production||WRITE_DB_USER=postgres||WRITE_DB_PASSWORD=${DB_PASSWORD}||WRITE_DB_HOST=/cloudsql/${INSTANCE}||WRITE_DB_PORT=5432||WRITE_DB_NAME=samba-wave||READ_DB_USER=postgres||READ_DB_PASSWORD=${DB_PASSWORD}||READ_DB_HOST=/cloudsql/${INSTANCE}||READ_DB_PORT=5432||READ_DB_NAME=samba-wave||DB_SSL_REQUIRED=false||WEB_CONCURRENCY=1||TERMINATION_GRACE_HACK=1||JWT_SECRET_KEY=${JWT_SECRET}||JWT_ALGORITHM=HS256||CORS_EXTRA_ORIGINS=https://samba-wave-deploy.vercel.app,https://samba-wave-deploy-git-main-samba-wave.vercel.app" \
            --add-cloudsql-instances "${INSTANCE}" \
            --allow-unauthenticated \
            --vpc-egress=all-traffic \
            --quiet

      - name: Verify deployment revision
        env:
          PROJECT: samba-wave-molle
        run: |
          echo "=== 배포 검증 시작 ==="
          # 최신 리비전 확인
          LATEST=$(gcloud run revisions list \
            --service=samba-wave-api \
            --region=asia-northeast3 \
            --project="${PROJECT}" \
            --sort-by="~creationTimestamp" \
            --limit=1 \
            --format="value(name)")
          echo "최신 리비전: ${LATEST}"

          # 현재 트래픽 받는 리비전 확인
          SERVING=$(gcloud run services describe samba-wave-api \
            --region=asia-northeast3 \
            --project="${PROJECT}" \
            --format="value(status.traffic[0].revisionName)")
          echo "서빙 리비전: ${SERVING}"

          # 불일치 시 최신 리비전으로 트래픽 전환
          if [ "${LATEST}" != "${SERVING}" ]; then
            echo "⚠️ 리비전 불일치! ${SERVING} → ${LATEST} 전환 시도"
            gcloud run services update-traffic samba-wave-api \
              --to-revisions="${LATEST}=100" \
              --region=asia-northeast3 \
              --project="${PROJECT}"
            echo "✅ 트래픽 전환 완료"
          else
            echo "✅ 최신 리비전이 정상 서빙 중"
          fi

          # 헬스체크
          HEALTH_URL="https://samba-wave-api-363598397345.asia-northeast3.run.app/api/v1/health"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${HEALTH_URL}" --max-time 10)
          if [ "${HTTP_CODE}" = "200" ]; then
            echo "✅ 헬스체크 통과 (HTTP ${HTTP_CODE})"
          else
            echo "❌ 헬스체크 실패 (HTTP ${HTTP_CODE})"
            exit 1
          fi
