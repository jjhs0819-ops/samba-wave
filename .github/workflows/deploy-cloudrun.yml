 name: Deploy Backend to Cloud Run

  on:
    workflow_dispatch:
    push:
      branches: [main]
      paths:
        - 'backend/**'

  jobs:
    deploy:
      name: Deploy to Cloud Run
      runs-on: ubuntu-latest
      permissions:
        contents: read
        id-token: write

      steps:
        - uses: actions/checkout@v4

        - uses: google-github-actions/auth@v2
          with:
            workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
            service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

        - uses: google-github-actions/setup-gcloud@v2

        - name: Deploy to Cloud Run
          env:
            DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          run: |
            gcloud run deploy samba-wave-api \
              --source ./backend \
              --region asia-northeast3 \
              --project project-d57efcc7-c0d8-4778-837 \
              --update-env-vars "ENVIRONMENT=production" \
              --update-env-vars "WRITE_DB_USER=postgres" \
              --update-env-vars "WRITE_DB_PASS=${DB_PASSWORD}" \
              --update-env-vars
  "WRITE_DB_HOST=/cloudsql/project-d57efcc7-c0d8-4778-837:asia-northeast3:samba-wave-db" \
              --update-env-vars "WRITE_DB_PORT=5432" \
              --update-env-vars "WRITE_DB_NAME=samba-wave" \
              --update-env-vars "READ_DB_USER=postgres" \
              --update-env-vars "READ_DB_PASS=${DB_PASSWORD}" \
              --update-env-vars
  "READ_DB_HOST=/cloudsql/project-d57efcc7-c0d8-4778-837:asia-northeast3:samba-wave-db" \
              --update-env-vars "READ_DB_PORT=5432" \
              --update-env-vars "READ_DB_NAME=samba-wave" \
              --update-env-vars "DB_SSL_REQUIRED=false" \
              --update-env-vars "WEB_CONCURRENCY=1" \
              --update-env-vars "TERMINATION_GRACE_HACK=1" \
              --add-cloudsql-instances "project-d57efcc7-c0d8-4778-837:asia-northeast3:samba-wave-db" \
              --allow-unauthenticated \
              --quiet
