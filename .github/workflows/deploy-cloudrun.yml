name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and Deploy to Cloud Run
        run: |
          gcloud builds submit \
            --tag asia-northeast3-docker.pkg.dev/glass-sight-452013-n6/samba-wave/backend:latest \
            ./backend \
            --project glass-sight-452013-n6

          gcloud run deploy samba-wave-backend \
            --image asia-northeast3-docker.pkg.dev/glass-sight-452013-n6/samba-wave/backend:latest \
            --region asia-northeast3 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --set-env-vars ENVIRONMENT=production,write_db_user=samba-user,write_db_password=SambaWave2024x,write_db_host=34.64.205.34,write_db_port=5432,write_db_name=samba-wave,read_db_user=samba-user,read_db_password=SambaWave2024x,read_db_host=34.64.205.34,read_db_port=5432,read_db_name=samba-wave,db_ssl_required=false,jwt_secret_key=samba-wave-production-secret-2024 \
            --project glass-sight-452013-n6 \
            --quiet
