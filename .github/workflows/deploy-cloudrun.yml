name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Write env vars file
        run: |
          cat > /tmp/cloudrun-env.yaml << EOF
          ENVIRONMENT: "production"
          WRITE_DB_USER: "postgres"
          WRITE_DB_HOST: "/cloudsql/fresh-sanctuary-489804-v4:asia-northeast3:samba-wave-db"
          WRITE_DB_PORT: "5432"
          WRITE_DB_NAME: "railway"
          READ_DB_USER: "postgres"
          READ_DB_HOST: "/cloudsql/fresh-sanctuary-489804-v4:asia-northeast3:samba-wave-db"
          READ_DB_PORT: "5432"
          READ_DB_NAME: "railway"
          DB_SSL_REQUIRED: "false"
          WEB_CONCURRENCY: "1"
          GUNICORN_CMD_ARGS: "--timeout 300 --graceful-timeout 300"
          TERMINATION_GRACE_HACK: "1"
          PROXY_URLS: "${{ secrets.PROXY_URLS }}"
          COLLECT_PROXY_URL: "${{ secrets.COLLECT_PROXY_URL }}"
          API_GATEWAY_KEY: "${{ secrets.API_GATEWAY_KEY }}"
          COMMIT_SHA: "${{ github.sha }}"
          EOF

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy samba-wave-api \
            --source ./backend \
            --region asia-northeast3 \
            --project fresh-sanctuary-489804-v4 \
            --env-vars-file /tmp/cloudrun-env.yaml \
            --memory 2Gi \
            --min-instances=1 \
            --no-cpu-throttling \
            --quiet

      - name: Verify traffic on latest revision
        run: |
          LATEST=$(gcloud run revisions list \
            --service=samba-wave-api \
            --region=asia-northeast3 \
            --project=fresh-sanctuary-489804-v4 \
            --sort-by=~createTime \
            --limit=1 \
            --format="value(name)")
          SERVING=$(gcloud run services describe samba-wave-api \
            --region=asia-northeast3 \
            --project=fresh-sanctuary-489804-v4 \
            --format="value(status.traffic[0].revisionName)")
          echo "최신 리비전: $LATEST"
          echo "트래픽 리비전: $SERVING"
          if [ "$LATEST" != "$SERVING" ]; then
            echo "⚠️ 트래픽이 구 리비전에 고정됨 — 강제 전환"
            gcloud run services update-traffic samba-wave-api \
              --region=asia-northeast3 \
              --project=fresh-sanctuary-489804-v4 \
              --to-latest --quiet
            echo "✅ 최신 리비전으로 트래픽 전환 완료"
          fi

      - name: Health Check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://samba-wave-api-363598397345.asia-northeast3.run.app/api/v1/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check 실패 (HTTP $STATUS)"
            gcloud run services describe samba-wave-api \
              --region=asia-northeast3 \
              --project=fresh-sanctuary-489804-v4 \
              --format="value(status.traffic)"
            exit 1
          fi
          echo "✅ Health check 통과"
